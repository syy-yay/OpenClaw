apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw-app
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openclaw-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: openclaw-app
    spec:
      containers:
      - name: openclaw-app
        image: 192.168.1.200:5000/openclaw/myapp:v2
        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: openclaw-app-svc
  namespace: default
spec:
  selector:
    app: openclaw-app
  ports:
  - port: 80
    targetPort: 5000
  type: NodePort
